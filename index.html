<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR ตารางธาตุ</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap');

        body { font-family: 'Mali', cursive; background-color: #1a1a2e; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; }
        
        #game-container { position: relative; width: 100%; max-width: 1280px; aspect-ratio: 16 / 9; background: radial-gradient(circle at center, #2a2a4a 0%, #111122 100%); border-radius: 24px; box-shadow: 0 0 40px rgba(138, 43, 226, 0.4); overflow: hidden; }

        #webcam { display: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

        #center-target {
            position: absolute;
            top: 15%; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            pointer-events: none;
            text-align: center;
        }
        
        .target-box { background: rgba(255, 255, 255, 0.15); border: 4px solid rgba(255, 255, 255, 0.4); border-radius: 30px; padding: 15px 40px; backdrop-filter: blur(8px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; background: rgba(0,0,0,0.6); }
    </style>
</head>
<body>

<div id="game-container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="game-canvas"></canvas>

    <div id="ui-layer" style="display: none;">
        <!-- ปรับตำแหน่งด้วย style="top: 15%" ให้ตรงกับกล่องคำถาม -->
        <div class="absolute left-6 bg-white/20 backdrop-blur-md px-6 py-2 rounded-full border-2 border-white/50 text-white font-bold text-xl shadow-lg" style="top: 15%;">
            คะแนน: <span id="score-display" class="text-yellow-300">0</span>
        </div>
        
        <div class="absolute right-6 bg-white/20 backdrop-blur-md px-6 py-2 rounded-full border-2 border-white/50 text-white font-bold text-xl shadow-lg" style="top: 15%;">
            เวลา: <span id="time-display" class="text-white">30</span>
        </div>
        
        <div id="center-target" class="animate-bounce flex flex-col items-center">
            <div class="target-box">
                <div id="target-text" class="text-5xl font-bold text-white drop-shadow-lg">โลหะ</div>
            </div>
            <div class="text-white bg-black/30 mt-3 px-4 py-1 rounded-full text-lg">แตะธาตุที่ตรงกับหมวดหมู่นี้!</div>
        </div>
    </div>

    <div id="start-screen" class="screen">
        <div class="bg-white p-8 rounded-3xl text-center max-w-lg border-4 border-purple-500">
            <h1 class="text-4xl font-bold text-purple-700 mb-4">🧪 AR ตารางธาตุ</h1>
            <button onclick="startGame()" class="bg-yellow-400 font-bold py-4 px-8 rounded-full text-2xl hover:scale-105 transition">เริ่มเกมเลย!</button>
        </div>
    </div>
</div>

<script>
    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('ui-layer').style.display = 'block';
    }
</script>
</body>
</html>
